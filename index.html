<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Elohim Financeiro</title>

  <!-- PWA -->
  <meta name="theme-color" content="#ef4444">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elohim">

  <link rel="manifest" href="/manifest.json">

  <!-- Ícones -->
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
  <link rel="icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" sizes="512x512" href="/icons/icon-512.png">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css">

</head>

<body>

<!-- ================= SPLASH ULTRA PREMIUM ================= -->
<div id="splashScreen" class="splash-screen ultra">
  <div class="splash-bg-gradient"></div>
  <div class="splash-bg-orb splash-orb-1"></div>
  <div class="splash-bg-orb splash-orb-2"></div>
  <div class="splash-bg-orb splash-orb-3"></div>
  <div class="splash-grid"></div>
  <div class="splash-noise"></div>

  <div class="splash-content ultra">
    <div class="splash-logo-shell ultra">
      <div class="splash-logo-ring"></div>
      <div class="splash-logo-ring ring-2"></div>
      <div class="splash-logo-glow"></div>
      <img src="/icons/icon-512.png" class="splash-logo ultra">
    </div>

    <div class="splash-brand ultra">
      <h1 class="splash-title ultra">Elohim</h1>
      <p class="splash-subtitle ultra">Financeiro Inteligente</p>
    </div>

    <div class="splash-loader ultra">
      <div class="splash-loader-track"></div>
      <div class="splash-loader-bar"></div>
      <div class="splash-loader-shine"></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-box">
      <img src="./logo-elohim.png" class="logo">
    </div>

    <div class="user-box">
      <strong id="userEmail"></strong>
      <span>ADMIN</span>
    </div>

    <nav>
      <button onclick="app.navigate('dashboard')">Dashboard</button>
      <button onclick="app.navigate('contas-pagar')">Contas a Pagar</button>
      <button onclick="app.navigate('contas-pagas')">Contas Pagas</button>
      <button onclick="app.navigate('contas-receber')">Contas a Receber</button>
      <button onclick="app.navigate('contas-recebidas')">Contas Recebidas</button>
      <button onclick="app.navigate('faturamento')">Faturamento</button>
      <button onclick="app.navigate('metas')">Metas</button>
      <button onclick="app.navigate('importar')">Importar</button>
      <button onclick="app.navigate('resumo')">Resumo</button>
      <button onclick="app.navigate('planejamento')">Planejamento</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main id="mainContent"></main>

</div>

<!-- ================= SCRIPTS ================= -->

<!-- 🔥 IMPORTANTE: Chart primeiro -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- CONFIG / CORE -->
<script src="./js/config.js"></script>
<script src="./js/api/supabase.js"></script>
<script src="./js/core/utils.js"></script>
<script src="./js/core/navigation.js"></script>
<script src="./js/core/auth.js"></script>

<!-- MÓDULOS -->
<script src="./js/modules/dashboard.js"></script>
<script src="./js/modules/contas-pagar.js"></script>
<script src="./js/modules/contas-pagas.js"></script>
<script src="./js/modules/contas-receber.js"></script>
<script src="./js/modules/contas-recebidas.js"></script>
<script src="./js/modules/faturamento.js"></script>
<script src="./js/modules/metas.js"></script>
<script src="./js/modules/importar.js"></script>
<script src="./js/modules/resumo.js"></script>
<script src="./js/modules/planejamento.js"></script>

<!-- APP PRINCIPAL -->
<script src="./js/app.js"></script>

<!-- ================= SPLASH CONTROL ================= -->
<script>
window.addEventListener("load", () => {
  const splash = document.getElementById("splashScreen");
  if (!splash) return;

  const jaViu = sessionStorage.getItem("splashShown");

  if (jaViu) {
    splash.remove();
    return;
  }

  sessionStorage.setItem("splashShown", "1");

  setTimeout(() => {
    splash.classList.add("hide");
  }, 1800);

  setTimeout(() => {
    splash.remove();
  }, 2500);
});
</script>

<!-- ================= SERVICE WORKER ================= -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js");
  });
}
</script>

</body>
</html>

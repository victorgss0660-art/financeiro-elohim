<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Elohim</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b0b0b, #1a0000);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .box {
      width: 100%;
      max-width: 430px;
      background: rgba(20,20,20,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      box-sizing: border-box;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 190px;
      max-width: 100%;
      display: inline-block;
    }

    h2 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px 0;
      text-align: center;
      color: #bbb;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: #fff;
      box-sizing: border-box;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      box-shadow: 0 0 0 2px rgba(255, 42, 42, 0.35);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #d10000, #ff2a2a);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.02);
    }

    .msg {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .ok { color: #22c55e; }
    .err { color: #ff6b6b; }
    .info { color: #facc15; }

    .dashboard-temp {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      padding: 30px;
      box-sizing: border-box;
    }

    .dashboard-card {
      width: 100%;
      max-width: 700px;
      background: rgba(20,20,20,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      text-align: center;
    }

    .dashboard-card h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 34px;
    }

    .dashboard-card p {
      margin: 8px 0;
      font-size: 18px;
      color: #ddd;
    }

    .dashboard-card .perfil {
      color: #22c55e;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <img src="logo-elohim.png" alt="Elohim">
    </div>

    <h2>Entrar</h2>
    <p>Login com conexão direta ao banco</p>

    <input id="email" type="email" placeholder="Seu e-mail">
    <input id="senha" type="password" placeholder="Sua senha">
    <button id="entrar" type="button">Entrar</button>

    <div id="status" class="msg info">Página carregada. Pronto para testar login.</div>
  </div>

  <script>
    const SUPABASE_URL = "https://qaqszkhkizeifwkhumka.supabase.co";
    const SUPABASE_KEY = "sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

    const statusEl = document.getElementById("status");
    const emailEl = document.getElementById("email");
    const senhaEl = document.getElementById("senha");
    const entrarEl = document.getElementById("entrar");

    function setStatus(texto, tipo = "info") {
      statusEl.className = "msg " + tipo;
      statusEl.textContent = texto;
    }

    async function fazerLogin() {
      try {
        const email = (emailEl.value || "").trim().toLowerCase();
        const senha = senhaEl.value || "";

        if (!email || !senha) {
          setStatus("Preencha e-mail e senha.", "err");
          return;
        }

        setStatus("Consultando banco...", "info");

        const url =
          `${SUPABASE_URL}/rest/v1/usuarios` +
          `?select=*` +
          `&email=eq.${encodeURIComponent(email)}` +
          `&senha=eq.${encodeURIComponent(senha)}` +
          `&limit=1`;

        const resposta = await fetch(url, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
          }
        });

        const texto = await resposta.text();
        let dados = [];

        try {
          dados = JSON.parse(texto);
        } catch {
          setStatus("Resposta inválida do servidor:\n" + texto, "err");
          return;
        }

        if (!resposta.ok) {
          const mensagemErro = dados?.message || texto || "Erro desconhecido";
          setStatus(
            "Erro ao consultar usuários:\n" + mensagemErro +
            "\n\nVerifique:\n- chave pública correta\n- tabela usuarios existe\n- RLS desligado",
            "err"
          );
          return;
        }

        if (!dados || dados.length === 0) {
          setStatus(
            "Login inválido.\n\nVerifique:\n- e-mail\n- senha\n- cadastro na tabela usuarios",
            "err"
          );
          return;
        }

        const usuario = dados[0];

        setStatus(
          "Login realizado com sucesso.\n\nUsuário: " + usuario.email +
          "\nPerfil: " + usuario.perfil,
          "ok"
        );

        setTimeout(() => {
          document.body.innerHTML = `
            <div class="dashboard-temp">
              <div class="dashboard-card">
                <h1>Bem-vindo ao sistema</h1>
                <p><strong>Usuário:</strong> ${usuario.email}</p>
                <p class="perfil"><strong>Perfil:</strong> ${usuario.perfil}</p>
                <p>Login validado com sucesso.</p>
                <p>Agora a próxima etapa é ligar esta entrada ao dashboard completo.</p>
              </div>
            </div>
          `;
        }, 1000);

      } catch (erro) {
        setStatus("Erro inesperado:\n" + erro.message, "err");
      }
    }

    entrarEl.addEventListener("click", fazerLogin);

    senhaEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        fazerLogin();
      }
    });
  </script>
</body>
</html>

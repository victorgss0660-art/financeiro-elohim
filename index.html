<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elohim Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.hidden{display:none !important}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

.login-box{
  background:#111;
  padding:40px;
  border-radius:20px;
  width:100%;
  max-width:360px;
  text-align:center;
  border:1px solid #222;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.login-box img{
  width:130px;
  margin-bottom:20px;
}

.login-box h2{
  margin:0 0 16px 0;
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#fff;
  box-sizing:border-box;
  font-size:14px;
}

.login-box button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  color:white;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

.login-box button:hover{
  transform:translateY(-1px);
}

#msg{
  margin-top:14px;
  min-height:20px;
  color:#ff6b6b;
  font-size:14px;
}

/* APP */
.app{
  display:none;
}

.layout{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#111;
  padding:20px;
  border-right:1px solid #222;
}

.sidebar img{
  width:140px;
  margin-bottom:25px;
  display:block;
}

.user-box{
  background:#161616;
  padding:12px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #222;
}

.user-email{
  font-weight:700;
  font-size:14px;
  margin-bottom:4px;
  word-break:break-word;
}

.user-role{
  color:#aaa;
  font-size:12px;
  text-transform:uppercase;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button{
  background:none;
  border:none;
  color:#bbb;
  text-align:left;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

.menu button:hover{
  background:#1c1c1c;
  color:#fff;
}

.menu button.active{
  background:linear-gradient(90deg,#d10000,#ff2a2a);
  color:#fff;
}

.logout-btn{
  margin-top:18px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:20px;
  flex-wrap:wrap;
}

.header h1{
  margin:0;
  font-size:24px;
}

.user{
  color:#aaa;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#161616;
  padding:20px;
  border-radius:14px;
  border:1px solid #222;
}

.card .title{
  color:#aaa;
  font-size:13px;
}

.card .value{
  font-size:24px;
  font-weight:bold;
  margin-top:6px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.chart-card{
  background:#161616;
  border-radius:14px;
  border:1px solid #222;
  padding:15px;
}

.chart-title{
  margin:0 0 10px 0;
  font-size:16px;
  color:#ddd;
}

canvas{
  background:#fff;
  border-radius:12px;
  padding:10px;
}

/* STATUS */
.status{
  margin-top:20px;
  background:#161616;
  border-radius:14px;
  border:1px solid #222;
  padding:18px;
}

.status h3{
  margin-top:0;
}

.status-line{
  margin-bottom:8px;
  color:#ccc;
}

@media (max-width: 900px){
  .layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

  .cards{
    grid-template-columns:1fr;
  }

  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<!-- LOGIN -->
<section id="loginSection" class="login">
  <div class="login-box">
    <img src="logo-elohim.png" alt="Elohim">
    <h2>Entrar</h2>

    <input id="email" type="email" placeholder="E-mail">
    <input id="senha" type="password" placeholder="Senha">

    <button id="btnEntrar" type="button">Entrar</button>
    <p id="msg"></p>
  </div>
</section>

<!-- APP -->
<section id="appSection" class="app">
  <div class="layout">

    <aside class="sidebar">
      <img src="logo-elohim.png" alt="Elohim">

      <div class="user-box">
        <div class="user-email" id="userEmail">-</div>
        <div class="user-role" id="userPerfil">-</div>
      </div>

      <div class="menu">
        <button class="active" type="button">📊 Dashboard</button>
        <button type="button">💰 Financeiro</button>
        <button type="button">📈 Metas</button>
        <button type="button">⚙️ Configurações</button>
      </div>

      <button id="btnSair" class="logout-btn" type="button">Sair</button>
    </aside>

    <main class="content">
      <div class="header">
        <h1>Dashboard Financeiro</h1>
        <div class="user" id="headerUser">-</div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="title">Faturamento</div>
          <div class="value" id="fat">R$ 0,00</div>
        </div>

        <div class="card">
          <div class="title">Gastos</div>
          <div class="value" id="gas">R$ 0,00</div>
        </div>

        <div class="card">
          <div class="title">Lucro</div>
          <div class="value" id="lucro">R$ 0,00</div>
        </div>
      </div>

      <div class="grid">
        <div class="chart-card">
          <div class="chart-title">Gastos por Categoria</div>
          <canvas id="barChart"></canvas>
        </div>

        <div class="chart-card">
          <div class="chart-title">Distribuição</div>
          <canvas id="pieChart"></canvas>
        </div>
      </div>

      <div class="status">
        <h3>Status</h3>
        <div class="status-line" id="statusLinha1">Sistema carregado.</div>
        <div class="status-line" id="statusLinha2">Aguardando dados.</div>
      </div>
    </main>

  </div>
</section>

<script>
const URL = "https://qaqszkhkizeifwkhumka.supabase.co";
const KEY = "sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

let usuarioAtual = null;
let barChartInstance = null;
let pieChartInstance = null;

const loginSection = document.getElementById("loginSection");
const appSection = document.getElementById("appSection");

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const btnEntrar = document.getElementById("btnEntrar");
const msg = document.getElementById("msg");

const btnSair = document.getElementById("btnSair");
const userEmail = document.getElementById("userEmail");
const userPerfil = document.getElementById("userPerfil");
const headerUser = document.getElementById("headerUser");

const fatEl = document.getElementById("fat");
const gasEl = document.getElementById("gas");
const lucroEl = document.getElementById("lucro");

const statusLinha1 = document.getElementById("statusLinha1");
const statusLinha2 = document.getElementById("statusLinha2");

function formatarMoeda(valor){
  return Number(valor || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

async function login() {
  try {
    msg.innerText = "";

    const email = (emailInput.value || "").trim().toLowerCase();
    const senha = senhaInput.value || "";

    if (!email || !senha) {
      msg.innerText = "Preencha e-mail e senha.";
      return;
    }

    const url = `${URL}/rest/v1/usuarios?select=*&email=eq.${encodeURIComponent(email)}&senha=eq.${encodeURIComponent(senha)}&limit=1`;

    const res = await fetch(url, {
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY
      }
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = "Erro ao consultar o banco.";
      console.error(data);
      return;
    }

    if (!data || data.length === 0) {
      msg.innerText = "Login inválido.";
      return;
    }

    usuarioAtual = data[0];

    loginSection.classList.add("hidden");
    appSection.style.display = "block";

    userEmail.innerText = usuarioAtual.email || "-";
    userPerfil.innerText = usuarioAtual.perfil || "-";
    headerUser.innerText = usuarioAtual.email || "-";

    await carregarDashboard();
  } catch (erro) {
    msg.innerText = "Erro inesperado no login.";
    console.error(erro);
  }
}

async function carregarDashboard() {
  try {
    statusLinha1.innerText = "Carregando dados do dashboard...";
    statusLinha2.innerText = "Consultando Supabase...";

    const [gastosRes, mesesRes] = await Promise.all([
      fetch(`${URL}/rest/v1/gastos?select=*`, {
        headers: {
          apikey: KEY,
          Authorization: "Bearer " + KEY
        }
      }),
      fetch(`${URL}/rest/v1/meses?select=*`, {
        headers: {
          apikey: KEY,
          Authorization: "Bearer " + KEY
        }
      })
    ]);

    const gastos = await gastosRes.json();
    const meses = await mesesRes.json();

    if (!gastosRes.ok || !mesesRes.ok) {
      statusLinha1.innerText = "Erro ao carregar dados.";
      statusLinha2.innerText = "Verifique a chave e as tabelas.";
      console.error({ gastos, meses });
      return;
    }

    let totalGastos = 0;
    let categorias = {};

    gastos.forEach(g => {
      const valor = Number(g.valor || 0);
      totalGastos += valor;
      categorias[g.categoria] = (categorias[g.categoria] || 0) + valor;
    });

    const faturamento = Number(meses?.[0]?.faturamento || 0);
    const lucro = faturamento - totalGastos;

    fatEl.innerText = formatarMoeda(faturamento);
    gasEl.innerText = formatarMoeda(totalGastos);
    lucroEl.innerText = formatarMoeda(lucro);

    renderCharts(categorias);

    statusLinha1.innerText = "Dashboard carregado com sucesso.";
    statusLinha2.innerText = `Categorias encontradas: ${Object.keys(categorias).length}`;
  } catch (erro) {
    statusLinha1.innerText = "Erro inesperado ao carregar dashboard.";
    statusLinha2.innerText = "Veja o console para mais detalhes.";
    console.error(erro);
  }
}

function renderCharts(cats) {
  const labels = Object.keys(cats);
  const values = Object.values(cats);

  const cores = [
    "#ef4444", "#3b82f6", "#22c55e", "#f59e0b",
    "#a855f7", "#06b6d4", "#ec4899", "#84cc16",
    "#f97316", "#64748b", "#e11d48", "#14b8a6"
  ];

  if (barChartInstance) barChartInstance.destroy();
  if (pieChartInstance) pieChartInstance.destroy();

  const barCtx = document.getElementById("barChart");
  const pieCtx = document.getElementById("pieChart");

  barChartInstance = new Chart(barCtx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Gastos",
        data: values,
        backgroundColor: cores.slice(0, values.length),
        borderRadius: 8
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#fff" }
        }
      },
      scales: {
        x: {
          ticks: { color: "#fff" },
          grid: { color: "rgba(255,255,255,0.08)" }
        },
        y: {
          ticks: { color: "#fff" },
          grid: { color: "rgba(255,255,255,0.08)" }
        }
      }
    }
  });

  pieChartInstance = new Chart(pieCtx, {
    type: "pie",
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: cores.slice(0, values.length)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "#fff" }
        }
      }
    }
  });
}

btnEntrar.addEventListener("click", login);

senhaInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    login();
  }
});

btnSair.addEventListener("click", () => {
  usuarioAtual = null;
  emailInput.value = "";
  senhaInput.value = "";
  msg.innerText = "";
  appSection.style.display = "none";
  loginSection.classList.remove("hidden");
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Elohim</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: #fff;
}

.hidden { display: none !important; }

/* LOGIN */
.login-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #2b0000, #0b0b0b);
}

.login-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  max-width: 900px;
  width: 100%;
  background: #111;
  border-radius: 20px;
  overflow: hidden;
}

.login-left {
  padding: 40px;
}

.login-right {
  background: #fff;
  color: #000;
  padding: 40px;
}

.logo-box-login {
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 20px;
  display: inline-block;
}

.logo-box-sidebar {
  background: #fff;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.logo-img {
  max-width: 150px;
  width: 100%;
}

/* APP */
.app-shell {
  display: flex;
}

.sidebar {
  width: 250px;
  padding: 20px;
  background: #111;
}

.menu-item {
  padding: 10px;
  margin-bottom: 8px;
  background: #1a1a1a;
  border-radius: 10px;
  cursor: pointer;
}

.menu-item.active {
  background: #d10000;
}

.main {
  flex: 1;
  padding: 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

/* GRÁFICOS */
.chart-wrap {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
}

/* INPUTS */
input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #d10000;
  color: #fff;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<section id="loginScreen" class="login-screen">
  <div class="login-card">

    <div class="login-left">
      <div class="logo-box-login">
        <img src="logo-elohim.png" class="logo-img">
      </div>
      <p>Sistema financeiro inteligente</p>
    </div>

    <div class="login-right">
      <h2>Login</h2>
      <input id="loginEmail" placeholder="Email"><br><br>
      <input id="loginSenha" type="password" placeholder="Senha"><br><br>
      <button id="btnLogin">Entrar</button>
      <div id="loginErro"></div>
    </div>

  </div>
</section>

<!-- APP -->
<section id="appShell" class="app-shell hidden">

  <aside class="sidebar">
    <div class="logo-box-sidebar">
      <img src="logo-elohim.png" class="logo-img">
    </div>

    <div id="userName"></div>

    <div class="menu-item active" data-tab="dashboard">Dashboard</div>
    <div class="menu-item" data-tab="faturamento">Faturamento</div>
    <div class="menu-item" data-tab="metas">Metas</div>
    <div class="menu-item" data-tab="importar">Importar</div>
    <div class="menu-item" data-tab="resumo">Resumo</div>

    <button id="btnLogout">Sair</button>
  </aside>

  <main class="main">

    <h1>Financeiro</h1>

    <section class="cards">
      <div class="card">Faturamento: <span id="fat"></span></div>
      <div class="card">Gastos: <span id="gastos"></span></div>
      <div class="card">Saldo: <span id="saldo"></span></div>
      <div class="card">Meta: <span id="metaAtingida"></span></div>
    </section>

    <br>

    <div class="chart-wrap">
      <canvas id="barChart"></canvas>
    </div>

    <br>

    <div class="chart-wrap">
      <canvas id="pieChart"></canvas>
    </div>

  </main>
</section>

<script>
const SUPABASE_URL = "https://qaqszkhkizeifwkhumka.supabase.co";
const SUPABASE_KEY = "sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuarioAtual = null;

document.getElementById("btnLogin").onclick = async () => {
  const email = loginEmail.value;
  const senha = loginSenha.value;

  const { data } = await supabase
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .eq("senha", senha);

  if (!data || data.length === 0) {
    loginErro.innerText = "Erro no login";
    return;
  }

  usuarioAtual = data[0];

  loginScreen.classList.add("hidden");
  appShell.classList.remove("hidden");

  userName.innerText = usuarioAtual.email;
};

btnLogout.onclick = () => {
  location.reload();
};
</script>

</body>
</html>

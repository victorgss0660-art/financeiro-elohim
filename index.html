<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elohim Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#070707,#1a0000);
  color:#fff;
}

/* HEADER PREMIUM */
.header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header h1{
  margin:0;
}

.kpi{
  display:flex;
  gap:15px;
}

.kpi-box{
  background:#111;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#111;
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

.card input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
.container{
  padding:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card-box{
  background:#111;
  padding:20px;
  border-radius:16px;
}

.big{
  font-size:22px;
  font-weight:bold;
}

/* ALERTAS */
.alert{
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.alert.ok{background:#14532d;}
.alert.warn{background:#78350f;}
.alert.danger{background:#7f1d1d;}

/* PROGRESS */
.progress{
  height:8px;
  background:#222;
  border-radius:10px;
  margin-top:6px;
}

.progress div{
  height:100%;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

canvas{
  background:#fff;
  border-radius:12px;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <img src="logo-elohim.png" width="140"><br><br>
    <h2>Entrar</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button class="btn" onclick="loginUser()">Entrar</button>
    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="header">
  <h1>Dashboard Financeiro</h1>
  <div class="kpi">
    <div class="kpi-box">Faturamento: <span id="fat">0</span></div>
    <div class="kpi-box">Gastos: <span id="gas">0</span></div>
    <div class="kpi-box">Saldo: <span id="sal">0</span></div>
  </div>
</div>

<div class="container">

<div class="cards" id="cards"></div>

<div class="grid">
  <canvas id="bar"></canvas>
  <canvas id="line"></canvas>
</div>

<div id="alertas"></div>

</div>

</div>

<script>
const URL="https://qaqszkhkizeifwkhumka.supabase.co";
const KEY="sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

let user=null;

/* LOGIN */
async function loginUser(){
  let email=document.getElementById("email").value;
  let senha=document.getElementById("senha").value;

  let res=await fetch(`${URL}/rest/v1/usuarios?email=eq.${email}&senha=eq.${senha}`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  });

  let data=await res.json();

  if(data.length){
    user=data[0];
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    loadDashboard();
  }else{
    document.getElementById("msg").innerText="Login inválido";
  }
}

/* DASHBOARD */
async function loadDashboard(){

  let gastos=await fetch(`${URL}/rest/v1/gastos`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  }).then(r=>r.json());

  let meses=await fetch(`${URL}/rest/v1/meses`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  }).then(r=>r.json());

  let total=0;
  let categorias={};

  gastos.forEach(g=>{
    total+=Number(g.valor);
    categorias[g.categoria]=(categorias[g.categoria]||0)+Number(g.valor);
  });

  let fat=meses[0]?.faturamento||0;

  document.getElementById("fat").innerText=fat;
  document.getElementById("gas").innerText=total;
  document.getElementById("sal").innerText=fat-total;

  renderCards(categorias,fat);
  renderCharts(categorias);
}

/* CARDS COM META */
function renderCards(cats,fat){
  let html="";

  Object.keys(cats).forEach(c=>{
    let val=cats[c];
    let perc=(val/fat)*100;

    let color=perc<80?"green":perc<100?"orange":"red";

    html+=`
    <div class="card-box">
      <b>${c}</b><br>
      ${val}
      <div class="progress">
        <div style="width:${perc}%;background:${color}"></div>
      </div>
    </div>`;
  });

  document.getElementById("cards").innerHTML=html;
}

/* GRÁFICOS */
function renderCharts(cats){

  let labels=Object.keys(cats);
  let values=Object.values(cats);

  new Chart(bar,{
    type:"bar",
    data:{labels,datasets:[{data:values}]}
  });

  new Chart(line,{
    type:"line",
    data:{labels,datasets:[{data:values}]}
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Financeiro Elohim</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b0b0b;
      color:white;
      display:flex;
    }

    .sidebar {
      width:220px;
      background:#111;
      height:100vh;
      padding:20px;
    }

    .sidebar h2 {
      color:red;
    }

    .menu div {
      margin:15px 0;
      cursor:pointer;
    }

    .main {
      flex:1;
      padding:20px;
    }

    .cards {
      display:flex;
      gap:20px;
    }

    .card {
      background:#151515;
      padding:20px;
      border-radius:10px;
      flex:1;
    }

    canvas {
      margin-top:20px;
      background:white;
      border-radius:10px;
    }

    input {
      margin-top:20px;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <h2>ELOHIM</h2>

  <div class="menu">
    <div>Dashboard</div>
    <div>Resumo</div>
    <div>Metas</div>
    <div>Importar</div>
  </div>
</div>

<div class="main">

  <h1>Dashboard Financeiro</h1>

  <div class="cards">
    <div class="card">Faturamento: R$ <span id="fat">0</span></div>
    <div class="card">Gastos: R$ <span id="gastos">0</span></div>
    <div class="card">Saldo: R$ <span id="saldo">0</span></div>
  </div>

  <input type="file" id="file"/>

  <canvas id="barChart"></canvas>
  <canvas id="pieChart"></canvas>

</div>

<script>

let barChart, pieChart;

document.getElementById('file').addEventListener('change', handleFile);

function handleFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processar(json);
  };

  reader.readAsArrayBuffer(file);
}

function processar(data){

  let categorias = {};
  let total = 0;

  data.forEach(row => {
    let cat = row["CATEGORIA"];
    let val = parseFloat(row["VALOR"]);

    if(!categorias[cat]) categorias[cat] = 0;
    categorias[cat] += val;
    total += val;
  });

  document.getElementById("gastos").innerText = total.toFixed(2);

  let faturamento = 10000;
  document.getElementById("fat").innerText = faturamento;

  document.getElementById("saldo").innerText = (faturamento - total).toFixed(2);

  desenhar(categorias);
}

function desenhar(categorias){

  const labels = Object.keys(categorias);
  const valores = Object.values(categorias);

  if(barChart) barChart.destroy();
  if(pieChart) pieChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type:'bar',
    data:{
      labels:labels,
      datasets:[
        {
          label:"Gastos",
          data:valores,
          backgroundColor:"red"
        },
        {
          label:"Meta",
          data:valores.map(v => v * 0.9),
          type:'line'
        }
      ]
    }
  });

  pieChart = new Chart(document.getElementById("pieChart"), {
    type:'pie',
    data:{
      labels:labels,
      datasets:[{
        data:valores
      }]
    }
  });

}

</script>

</body>
</html>

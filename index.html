<!DOCTYPE html>
<html>
<head>
  <title>Financeiro Elohim</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h2>Financeiro Elohim</h2>

<input type="file" id="file" />

<canvas id="grafico"></canvas>

<script>

document.getElementById('file').addEventListener('change', handleFile);

function handleFile(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    processar(json);
  };

  reader.readAsArrayBuffer(file);
}

function processar(data){
  let categorias = {};

  data.forEach(row => {
    let cat = row["CATEGORIA"];
    let val = parseFloat(row["VALOR"]);

    if(!categorias[cat]) categorias[cat] = 0;
    categorias[cat] += val;
  });

  desenhar(categorias);
}

function desenhar(categorias){
  const labels = Object.keys(categorias);
  const valores = Object.values(categorias);

  new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: "Gastos",
        data: valores
      }]
    }
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Elohim</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b0b0b, #1a0000);
  color: #fff;
}

.hidden { display: none; }

/* LOGIN */
.login-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-card {
  width: 380px;
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  background: rgba(20,20,20,0.7);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
}

.logo-box-login img {
  width: 180px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #d10000, #ff2a2a);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  transform: scale(1.03);
}

/* APP */
.app-shell {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: rgba(20,20,20,0.8);
  backdrop-filter: blur(15px);
  padding: 20px;
}

.logo-box-sidebar img {
  width: 140px;
  margin-bottom: 20px;
}

.user-box {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}

.menu-item:hover {
  background: rgba(255,0,0,0.2);
}

.menu-item.active {
  background: linear-gradient(90deg, #d10000, #ff2a2a);
}

.logout-btn {
  margin-top: 20px;
  background: #222;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.card {
  background: rgba(30,30,30,0.7);
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<section id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="logo-box-login">
      <img src="logo-elohim.png">
    </div>

    <input id="loginEmail" placeholder="Seu e-mail">
    <input id="loginSenha" type="password" placeholder="Sua senha">

    <button id="btnLogin">Entrar</button>
    <div id="loginErro"></div>
  </div>
</section>

<!-- APP -->
<section id="appShell" class="app-shell hidden">

  <aside class="sidebar">
    <div class="logo-box-sidebar">
      <img src="logo-elohim.png">
    </div>

    <div class="user-box">
      <div id="userName"></div>
      <div id="userRole"></div>
    </div>

    <div class="menu-item active">Dashboard</div>
    <div class="menu-item">Faturamento</div>
    <div class="menu-item">Metas</div>
    <div class="menu-item">Importar</div>
    <div class="menu-item">Resumo</div>

    <button class="logout-btn" id="btnLogout">Sair</button>
  </aside>

  <main class="main">
    <h1>Dashboard Financeiro</h1>

    <div class="cards">
      <div class="card">Faturamento: <span id="fat"></span></div>
      <div class="card">Gastos: <span id="gastos"></span></div>
      <div class="card">Saldo: <span id="saldo"></span></div>
      <div class="card">Meta: <span id="metaAtingida"></span></div>
    </div>
  </main>

</section>

<script>
const SUPABASE_URL = "https://qaqszkhkizeifwkhumka.supabase.co";
const SUPABASE_KEY = "COLE_AQUI_SUA_PUBLISHABLE_KEY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let usuarioAtual = null;

// ELEMENTOS
const btnLogin = document.getElementById("btnLogin");
const btnLogout = document.getElementById("btnLogout");

const loginEmail = document.getElementById("loginEmail");
const loginSenha = document.getElementById("loginSenha");
const loginErro = document.getElementById("loginErro");

const loginScreen = document.getElementById("loginScreen");
const appShell = document.getElementById("appShell");

const userName = document.getElementById("userName");
const userRole = document.getElementById("userRole");

// LOGIN
btnLogin.addEventListener("click", async () => {
  const email = loginEmail.value;
  const senha = loginSenha.value;

  const { data } = await supabase
    .from("usuarios")
    .select("*")
    .eq("email", email)
    .eq("senha", senha);

  if (!data || data.length === 0) {
    loginErro.innerText = "Login inválido";
    return;
  }

  usuarioAtual = data[0];

  loginScreen.classList.add("hidden");
  appShell.classList.remove("hidden");

  userName.innerText = usuarioAtual.email;
  userRole.innerText = usuarioAtual.perfil;
});

// ENTER
loginSenha.addEventListener("keydown", (e) => {
  if (e.key === "Enter") btnLogin.click();
});

// LOGOUT
btnLogout.addEventListener("click", () => {
  location.reload();
});
</script>

</body>
</html>

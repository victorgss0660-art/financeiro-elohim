<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elohim Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* LAYOUT */
.layout{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  background:#111;
  padding:20px;
  border-right:1px solid #222;
}

.sidebar img{
  width:140px;
  margin-bottom:30px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu button{
  background:none;
  border:none;
  color:#bbb;
  text-align:left;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.menu button:hover{
  background:#1c1c1c;
  color:#fff;
}

/* CONTEÚDO */
.content{
  flex:1;
  padding:30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.header h1{
  margin:0;
  font-size:22px;
}

.user{
  color:#aaa;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#161616;
  padding:20px;
  border-radius:14px;
  border:1px solid #222;
}

.card .title{
  color:#aaa;
  font-size:13px;
}

.card .value{
  font-size:24px;
  font-weight:bold;
  margin-top:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

canvas{
  background:#161616;
  border-radius:14px;
  padding:15px;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#111;
  padding:40px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:#fff;
}

.login-box button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <img src="logo-elohim.png" width="130"><br><br>
    <h2>Entrar</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="logo-elohim.png">

  <div class="menu">
    <button>📊 Dashboard</button>
    <button>💰 Financeiro</button>
    <button>📈 Metas</button>
    <button>⚙️ Configurações</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="content">

<div class="header">
  <h1>Dashboard Financeiro</h1>
  <div class="user" id="user"></div>
</div>

<div class="cards">
  <div class="card">
    <div class="title">Faturamento</div>
    <div class="value" id="fat">0</div>
  </div>

  <div class="card">
    <div class="title">Gastos</div>
    <div class="value" id="gas">0</div>
  </div>

  <div class="card">
    <div class="title">Lucro</div>
    <div class="value" id="lucro">0</div>
  </div>
</div>

<div class="grid">
  <canvas id="bar"></canvas>
  <canvas id="pie"></canvas>
</div>

</div>
</div>

</div>

<script>
const URL="https://qaqszkhkizeifwkhumka.supabase.co";
const KEY="sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

async function login(){
  let email=emailInput.value;
  let senha=senhaInput.value;

  let res=await fetch(`${URL}/rest/v1/usuarios?email=eq.${email}&senha=eq.${senha}`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  });

  let data=await res.json();

  if(data.length){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText=email;
    load();
  }else{
    msg.innerText="Login inválido";
  }
}

async function load(){

  let gastos=await fetch(`${URL}/rest/v1/gastos`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  }).then(r=>r.json());

  let meses=await fetch(`${URL}/rest/v1/meses`,{
    headers:{apikey:KEY,Authorization:"Bearer "+KEY}
  }).then(r=>r.json());

  let total=0;
  let cats={};

  gastos.forEach(g=>{
    total+=Number(g.valor);
    cats[g.categoria]=(cats[g.categoria]||0)+Number(g.valor);
  });

  let fat=meses[0]?.faturamento||0;

  fatEl.innerText=fat;
  gasEl.innerText=total;
  lucro.innerText=fat-total;

  new Chart(bar,{
    type:"bar",
    data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats)}]}
  });

  new Chart(pie,{
    type:"pie",
    data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats)}]}
  });
}
</script>

</body>
</html>

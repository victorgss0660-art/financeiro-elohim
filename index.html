<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Elohim</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b0b0b, #1a0000);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      width: 100%;
      max-width: 420px;
      background: rgba(20,20,20,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      box-sizing: border-box;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img {
      width: 180px;
      max-width: 100%;
    }
    h2 {
      margin: 0 0 8px 0;
      text-align: center;
    }
    p {
      margin: 0 0 18px 0;
      text-align: center;
      color: #bbb;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #d10000, #ff2a2a);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .msg {
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .ok { color: #22c55e; }
    .err { color: #ff6b6b; }
    .info { color: #facc15; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <img src="logo-elohim.png" alt="Elohim">
    </div>

    <h2>Entrar</h2>
    <p>Teste de login com diagnóstico</p>

    <input id="email" type="email" placeholder="Seu e-mail">
    <input id="senha" type="password" placeholder="Sua senha">
    <button id="entrar">Entrar</button>

    <div id="status" class="msg info">Aguardando teste...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://qaqszkhkizeifwkhumka.supabase.co";
    const SUPABASE_KEY = "sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

    const statusEl = document.getElementById("status");
    const emailEl = document.getElementById("email");
    const senhaEl = document.getElementById("senha");
    const entrarEl = document.getElementById("entrar");

    function setStatus(text, type = "info") {
      statusEl.className = "msg " + type;
      statusEl.textContent = text;
    }

    let supabase = null;

    try {
      if (!window.supabase) {
        setStatus("Erro: biblioteca do Supabase não carregou.", "err");
      } else if (SUPABASE_KEY.includes("COLE_AQUI")) {
        setStatus("Erro: você ainda não trocou a Publishable Key no index.html.", "err");
      } else {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        setStatus("Supabase carregado. Tente fazer login.", "ok");
      }
    } catch (e) {
      setStatus("Erro ao iniciar Supabase:\n" + e.message, "err");
    }

    async function fazerLogin() {
      try {
        if (!supabase) {
          setStatus("Supabase não está inicializado.", "err");
          return;
        }

        const email = (emailEl.value || "").trim().toLowerCase();
        const senha = senhaEl.value || "";

        if (!email || !senha) {
          setStatus("Preencha e-mail e senha.", "err");
          return;
        }

        setStatus("Consultando tabela usuarios...", "info");

        const { data, error } = await supabase
          .from("usuarios")
          .select("*")
          .eq("email", email)
          .eq("senha", senha)
          .limit(1);

        if (error) {
          setStatus(
            "Erro na consulta ao Supabase:\n" +
            error.message +
            "\n\nVerifique:\n- tabela usuarios existe\n- RLS está desligado\n- chave pública está correta",
            "err"
          );
          return;
        }

        if (!data || data.length === 0) {
          setStatus(
            "Login inválido.\n\nVerifique:\n- e-mail digitado\n- senha digitada\n- se o usuário existe na tabela usuarios",
            "err"
          );
          return;
        }

        const usuario = data[0];
        setStatus(
          "Login OK!\n\nUsuário: " + usuario.email + "\nPerfil: " + usuario.perfil,
          "ok"
        );
      } catch (e) {
        setStatus("Erro inesperado:\n" + e.message, "err");
      }
    }

    entrarEl.addEventListener("click", fazerLogin);
    senhaEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") fazerLogin();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elohim Financeiro</title>

  <link rel="stylesheet" href="./css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<!-- LOGIN -->
<section id="loginScreen" class="login-screen">
  <div class="login-card">
    <h2>Login</h2>
    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginSenha" type="password" placeholder="Senha">
    <button id="loginBtn" class="btn">Entrar</button>
    <div id="loginMsg"></div>
  </div>
</section>

<!-- APP -->
<section id="appShell" class="app hidden">

  <!-- MENU -->
  <aside class="sidebar">
    <div id="userEmail"></div>
    <div id="userPerfil"></div>
    <div id="perfilBadge"></div>

    <div class="menu">
      <button class="menu-btn active" data-tab="dashboard">Dashboard</button>
      <button class="menu-btn" data-tab="contas-pagar">Contas a Pagar</button>
      <button class="menu-btn" data-tab="contas-pagas">Contas Pagas</button>
      <button class="menu-btn" data-tab="contas-receber">Contas a Receber</button>
      <button class="menu-btn" data-tab="contas-recebidas">Contas Recebidas</button>
      <button class="menu-btn" data-tab="faturamento">Faturamento</button>
      <button class="menu-btn" data-tab="metas">Metas</button>
      <button class="menu-btn" data-tab="importar">Importar</button>
      <button class="menu-btn" data-tab="resumo">Resumo</button>
      <button class="menu-btn" data-tab="planejamento">Planejamento</button>
    </div>

    <button id="btnSair" class="btn">Sair</button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="main">

    <!-- FILTRO -->
    <div id="blocoFiltroMesAno">
      <select id="mesSelect">
        <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
        <option>Abril</option><option>Maio</option><option>Junho</option>
        <option>Julho</option><option>Agosto</option><option>Setembro</option>
        <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
      </select>

      <select id="anoSelect">
        <option>2024</option>
        <option selected>2026</option>
        <option>2027</option>
      </select>

      <button id="btnCarregarMes" class="btn">Carregar</button>
    </div>

    <div id="appMsg"></div>

    <!-- DASHBOARD -->
    <section id="tab-dashboard" class="tab-section active">
      <div class="cards">
        <div><div id="fat"></div></div>
        <div><div id="gas"></div></div>
        <div><div id="saldo"></div></div>
        <div><div id="metaAtingida"></div></div>
      </div>

      <canvas id="barChart"></canvas>
      <canvas id="pieChart"></canvas>

      <div id="alertList"></div>

      <table>
        <tbody id="tabelaResumo"></tbody>
      </table>
    </section>

    <!-- CONTAS A PAGAR -->
    <section id="tab-contas-pagar" class="tab-section">
      <input id="cpFornecedor">
      <input id="cpDescricao">
      <input id="cpCategoria">
      <input id="cpDocumento">
      <input id="cpValor">
      <input id="cpVencimento">
      <textarea id="cpObservacoes"></textarea>
      <button id="btnSalvarContaPagar">Salvar</button>

      <table>
        <tbody id="tabelaContasPagar"></tbody>
      </table>
    </section>

    <!-- CONTAS PAGAS -->
    <section id="tab-contas-pagas" class="tab-section">
      <table>
        <tbody id="tabelaContasPagas"></tbody>
      </table>
    </section>

    <!-- CONTAS A RECEBER -->
    <section id="tab-contas-receber" class="tab-section">
      <input id="crrCliente">
      <input id="crrDescricao">
      <input id="crrCategoria">
      <input id="crrDocumento">
      <input id="crrValor">
      <input id="crrVencimento">
      <textarea id="crrObs"></textarea>
      <button id="btnSalvarContaReceber">Salvar</button>

      <table>
        <tbody id="tabelaContasReceber"></tbody>
      </table>
    </section>

    <!-- CONTAS RECEBIDAS -->
    <section id="tab-contas-recebidas" class="tab-section">
      <table>
        <tbody id="tabelaContasRecebidas"></tbody>
      </table>
    </section>

    <!-- FATURAMENTO -->
    <section id="tab-faturamento" class="tab-section">
      <input id="faturamentoInput">
      <button id="btnSalvarFaturamento">Salvar</button>
    </section>

    <!-- METAS -->
    <section id="tab-metas" class="tab-section">
      <div id="metaGrid"></div>
      <button id="btnSalvarMetas">Salvar</button>
    </section>

    <!-- IMPORTAR -->
    <section id="tab-importar" class="tab-section">
      <input id="fileInput" type="file">
    </section>

    <!-- RESUMO -->
    <section id="tab-resumo" class="tab-section">
      <table>
        <tbody id="tabelaResumoAnual"></tbody>
      </table>
    </section>

    <!-- PLANEJAMENTO -->
    <section id="tab-planejamento" class="tab-section">

      <div id="totalDisponivelBadge"></div>

      <input class="saldo-conta">
      <input class="saldo-conta">
      <input class="saldo-conta">

      <div id="riskMenorSaldo"></div>
      <div id="riskSemanasNegativas"></div>
      <div id="riskMaiorSaida"></div>

      <div id="riskList"></div>

      <canvas id="planejamentoChart"></canvas>

      <table>
        <tbody id="tabelaPlanejamento"></tbody>
      </table>
    </section>

  </main>
</section>

<!-- SCRIPTS -->
<script src="./js/config.js"></script>
<script src="./js/api/supabase.js"></script>
<script src="./js/core/utils.js"></script>
<script src="./js/core/navigation.js"></script>
<script src="./js/core/auth.js"></script>

<script src="./js/modules/dashboard.js"></script>
<script src="./js/modules/contas-pagar.js"></script>
<script src="./js/modules/contas-pagas.js"></script>
<script src="./js/modules/contas-receber.js"></script>
<script src="./js/modules/contas-recebidas.js"></script>
<script src="./js/modules/faturamento.js"></script>
<script src="./js/modules/metas.js"></script>
<script src="./js/modules/importar.js"></script>
<script src="./js/modules/resumo.js"></script>
<script src="./js/modules/planejamento.js"></script>

<script src="./js/app.js"></script>

</body>
</html>

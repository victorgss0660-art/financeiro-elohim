<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elohim Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
.header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* KPI */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  padding:20px;
}

.kpi{
  background:#151515;
  padding:18px;
  border-radius:12px;
}

.kpi h3{
  margin:0;
  font-size:14px;
  color:#aaa;
}

.kpi p{
  font-size:22px;
  margin:5px 0 0;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#151515;
  padding:20px;
  border-radius:12px;
}

/* ALERT */
.alert{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
}

.ok{background:#065f46}
.warn{background:#78350f}
.bad{background:#7f1d1d}
</style>
</head>

<body>

<div class="header">Dashboard Financeiro</div>

<div class="kpis">
  <div class="kpi">
    <h3>Receita</h3>
    <p id="receita">0</p>
  </div>
  <div class="kpi">
    <h3>Gastos</h3>
    <p id="gastos">0</p>
  </div>
  <div class="kpi">
    <h3>Lucro</h3>
    <p id="lucro">0</p>
  </div>
  <div class="kpi">
    <h3>Meta</h3>
    <p id="meta">0%</p>
  </div>
</div>

<div class="grid">
  <div class="card">
    <canvas id="barChart"></canvas>
  </div>

  <div class="card">
    <canvas id="pieChart"></canvas>
  </div>
</div>

<div class="card" style="margin:20px">
  <canvas id="lineChart"></canvas>
</div>

<div class="card" style="margin:20px">
  <h3>Alertas</h3>
  <div id="alertas"></div>
</div>

<script>

const URL="https://qaqszkhkizeifwkhumka.supabase.co";
const API_KEY="sb_publishable_D8_2NXn6BH9xA_RnfEJ-uA_jventu5_";

/* CORES FORTES */
const cores=[
"#ff0000","#2563eb","#22c55e","#f59e0b",
"#a855f7","#06b6d4","#ec4899","#eab308"
];

async function carregar(){

  let gastos=await fetch(`${URL}/rest/v1/gastos`,{
    headers:{apikey:API_KEY,Authorization:"Bearer "+API_KEY}
  }).then(r=>r.json());

  let meses=await fetch(`${URL}/rest/v1/meses`,{
    headers:{apikey:API_KEY,Authorization:"Bearer "+API_KEY}
  }).then(r=>r.json());

  let metas=await fetch(`${URL}/rest/v1/metas`,{
    headers:{apikey:API_KEY,Authorization:"Bearer "+API_KEY}
  }).then(r=>r.json());

  let categorias={};
  let total=0;

  gastos.forEach(g=>{
    total+=Number(g.valor);
    categorias[g.categoria]=(categorias[g.categoria]||0)+Number(g.valor);
  });

  let receita=meses[0]?.faturamento||0;
  let lucro=receita-total;

  document.getElementById("receita").innerText=receita;
  document.getElementById("gastos").innerText=total;
  document.getElementById("lucro").innerText=lucro;

  /* META */
  let metaTotal=0;
  metas.forEach(m=>{
    metaTotal+=(m.meta/100)*receita;
  });

  let perc=(total/metaTotal*100)||0;
  document.getElementById("meta").innerText=perc.toFixed(0)+"%";

  /* BAR + META */
  new Chart(barChart,{
    type:"bar",
    data:{
      labels:Object.keys(categorias),
      datasets:[
        {
          label:"Gasto",
          data:Object.values(categorias),
          backgroundColor:cores
        }
      ]
    }
  });

  /* DONUT */
  new Chart(pieChart,{
    type:"doughnut",
    data:{
      labels:Object.keys(categorias),
      datasets:[{
        data:Object.values(categorias),
        backgroundColor:cores
      }]
    }
  });

  /* LINHA (simulação evolução) */
  new Chart(lineChart,{
    type:"line",
    data:{
      labels:["Jan","Fev","Mar","Abr","Mai"],
      datasets:[
        {label:"Receita",data:[10,15,12,20,18],borderColor:"#22c55e"},
        {label:"Gastos",data:[8,10,9,15,14],borderColor:"#ef4444"},
        {label:"Lucro",data:[2,5,3,5,4],borderColor:"#3b82f6"}
      ]
    }
  });

  /* ALERTAS */
  let html="";
  Object.keys(categorias).forEach(c=>{
    let gasto=categorias[c];
    let meta=metas.find(m=>m.categoria==c);

    if(meta){
      let limite=(meta.meta/100)*receita;
      if(gasto>limite){
        html+=`<div class="alert bad">${c} acima da meta</div>`;
      }else{
        html+=`<div class="alert ok">${c} dentro da meta</div>`;
      }
    }
  });

  document.getElementById("alertas").innerHTML=html;
}

carregar();

</script>

</body>
</html>

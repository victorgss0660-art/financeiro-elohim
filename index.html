<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Financeiro Elohim</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }
    .container {
      padding: 20px;
    }
    .login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
    }
    input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
    .card {
      background: #111;
      padding: 20px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
const users = {
  "victor@usinagemelohim.com.br": {senha: "@Elohim06", tipo: "admin"},
  "natalia@usinagemelohim.com.br": {senha: "@Elohim01", tipo: "viewer"}
}

function renderLogin(){
  document.getElementById("app").innerHTML = `
    <div class="login">
      <div>
        <h2>Login Elohim</h2>
        <input id="user" placeholder="email">
        <input id="pass" type="password" placeholder="senha">
        <button onclick="login()">Entrar</button>
      </div>
    </div>
  `
}

function login(){
  const u = document.getElementById("user").value
  const p = document.getElementById("pass").value

  if(users[u] && users[u].senha === p){
    localStorage.setItem("user", u)
    renderDashboard()
  } else {
    alert("Login inválido")
  }
}

function renderDashboard(){
  document.getElementById("app").innerHTML = `
    <div class="container">
      <h1>Dashboard Financeiro</h1>

      <div class="card">
        <h3>Resumo</h3>
        <p>Faturamento: R$ 10.000</p>
        <p>Gastos: R$ 6.500</p>
      </div>

      <canvas id="grafico"></canvas>
    </div>
  `

  const ctx = document.getElementById('grafico')

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['MC','MP','TERC','FRETE'],
      datasets: [
        {
          label: 'Gasto',
          data: [2000,1500,1000,2000],
          backgroundColor: 'red'
        },
        {
          label: 'Meta',
          data: [1800,1600,900,1800],
          type: 'line'
        }
      ]
    }
  })
}

if(localStorage.getItem("user")){
  renderDashboard()
} else {
  renderLogin()
}
</script>

</body>
</html>

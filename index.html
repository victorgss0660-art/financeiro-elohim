<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Financeiro Empresarial</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <strong>ME</strong>
      <span>Financeiro</span>
    </div>

    <nav class="menu">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="contas-pagar">Contas a Pagar</button>
      <button data-tab="contas-pagas">Contas Pagas</button>
      <button data-tab="contas-receber">Contas a Receber</button>
      <button data-tab="planejamento">Planejamento</button>
      <button data-tab="inserir-dados">Inserir Dados</button>
    </nav>

  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <!-- HEADER -->
    <header class="topbar">
      <div>
        <h1>Financeiro Empresarial</h1>
        <p>Sistema de gestão financeira</p>
      </div>

      <div class="filtros">
        <select id="mesSelect"></select>
        <input type="number" id="anoSelect">
        <button onclick="app.recarregarAbaAtual()">Atualizar</button>
      </div>
    </header>

    <!-- DASHBOARD -->
    <section id="tab-dashboard" class="tab-section active">
      <div class="cards">

        <div class="card">
          <span>Faturamento</span>
          <strong id="dashFaturamento">R$ 0,00</strong>
        </div>

        <div class="card">
          <span>Gastos</span>
          <strong id="dashGastos">R$ 0,00</strong>
        </div>

        <div class="card">
          <span>Lucro</span>
          <strong id="dashLucro">R$ 0,00</strong>
        </div>

        <div class="card">
          <span>Margem</span>
          <strong id="dashMargem">0%</strong>
        </div>

      </div>

      <div class="grid-2">

        <div class="panel">
          <h3>Gastos x Meta</h3>
          <div class="chart-box">
            <canvas id="chartMetaCategoria"></canvas>
          </div>
        </div>

        <div class="panel">
          <h3>Distribuição</h3>
          <div class="chart-box">
            <canvas id="chartDistribuicao"></canvas>
          </div>
        </div>

      </div>

      <div class="panel">
        <h3>Evolução Anual</h3>
        <div class="chart-box">
          <canvas id="chartEvolucao"></canvas>
        </div>
      </div>

    </section>

    <!-- CONTAS A PAGAR -->
    <section id="tab-contas-pagar" class="tab-section">
      <h2>Contas a Pagar</h2>
      <div id="contasPagarContainer"></div>
    </section>

    <!-- CONTAS PAGAS -->
    <section id="tab-contas-pagas" class="tab-section">
      <h2>Contas Pagas</h2>
      <div id="contasPagasContainer"></div>
    </section>

    <!-- CONTAS A RECEBER -->
    <section id="tab-contas-receber" class="tab-section">
      <h2>Contas a Receber</h2>
      <div id="contasReceberContainer"></div>
    </section>

    <!-- PLANEJAMENTO -->
    <section id="tab-planejamento" class="tab-section">
      <h2>Planejamento</h2>
      <div id="planejamentoContainer"></div>
    </section>

    <!-- INSERIR DADOS -->
    <section id="tab-inserir-dados" class="tab-section">
      <h2>Inserir Dados</h2>
      <div id="inserirDadosContainer"></div>
    </section>

  </main>

  <!-- JS -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/contas-pagar.js"></script>
  <script src="js/modules/contas-pagas.js"></script>
  <script src="js/modules/contas-receber.js"></script>
  <script src="js/modules/planejamento.js"></script>
  <script src="js/modules/inserir-dados.js"></script>

</body>
</html>

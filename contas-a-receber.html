<section id="tab-contas-receber" class="tab-section fade-in">

  <!-- FORMULÁRIO -->
  <section class="panel">
    <div class="panel-head">
      <h3>Cadastrar Conta a Receber</h3>
      <div class="badge">Recebíveis</div>
    </div>

    <div class="form-grid">
      <input id="crrCliente" placeholder="Cliente">
      <input id="crrDescricao" placeholder="Descrição">
      <input id="crrDocumento" placeholder="NF / FAT / Pedido">
      <input id="crrValor" type="number" step="0.01" placeholder="Valor">

      <input id="crrVencimento" type="date">
      <input id="crrCategoria" placeholder="Categoria">

      <textarea id="crrObs" class="full" placeholder="Observações"></textarea>
    </div>

    <button class="btn" onclick="salvarContaReceber()">Salvar conta</button>
  </section>

  <!-- TABELA -->
  <section class="panel table-wrap">
    <div class="panel-head">
      <h3>Contas a Receber</h3>
      <div class="badge">Pendentes</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Descrição</th>
          <th>Documento</th>
          <th>Categoria</th>
          <th>Valor</th>
          <th>Vencimento</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabelaContasReceber">
        <tr>
          <td colspan="8" class="muted">Nenhuma conta cadastrada.</td>
        </tr>
      </tbody>
    </table>
  </section>

</section>
